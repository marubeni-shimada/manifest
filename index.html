<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マニフェスト管理</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif; margin: 0; padding: 0; background: #F0F4F5; color: #0F172A; -webkit-font-smoothing: antialiased; }
  
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }
  
  .header { background: linear-gradient(135deg, #0F766E 0%, #0E7490 100%); color: white; padding: 18px 18px 24px; display: flex; align-items: center; gap: 10px; }
  .header .eyebrow { font-size: 10px; opacity: 0.85; letter-spacing: 1px; margin-bottom: 2px; font-weight: 500; }
  .header h1 { font-size: 17px; margin: 0; font-weight: 600; letter-spacing: 0.3px; }
  .back-btn { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border: none; color: white; font-size: 20px; cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0; }
  
  .content { padding: 16px; padding-bottom: 60px; }
  
  .user-card { background: linear-gradient(135deg, #ECFEFF 0%, #F0FDFA 100%); border: 1px solid #A5F3FC; padding: 12px 14px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
  .user-avatar { width: 36px; height: 36px; background: #0F766E; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .user-info-label { font-size: 10px; color: #0E7490; font-weight: 600; letter-spacing: 0.5px; }
  .user-info-name { font-size: 14px; font-weight: 600; color: #134E4A; }
  
  .section-title { font-size: 11px; color: #64748B; font-weight: 700; letter-spacing: 1.2px; margin: 0 0 12px; text-transform: uppercase; }
  
  .menu-btn { width: 100%; background: white; border: 1px solid #E2E8F0; border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px; text-align: left; margin-bottom: 12px; cursor: pointer; box-shadow: 0 1px 3px rgba(15,23,42,0.04); }
  .menu-btn:active { transform: scale(0.98); }
  .menu-btn .icon-box { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; font-size: 20px; }
  .icon-green { background: linear-gradient(135deg, #06C755 0%, #0F766E 100%); }
  .icon-blue { background: linear-gradient(135deg, #0EA5E9 0%, #0E7490 100%); }
  .menu-btn .text { flex: 1; }
  .menu-btn .title { font-size: 14px; font-weight: 600; color: #0F172A; }
  .menu-btn .desc { font-size: 11px; color: #64748B; margin-top: 3px; }
  .menu-btn .arrow { color: #94A3B8; font-size: 20px; }
  
  .divider { border-top: 1px solid #E2E8F0; margin: 20px 0 16px; }
  .sub-btn { width: 100%; background: white; border: 1px solid #E2E8F0; border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; margin-bottom: 8px; text-align: left; }
  .sub-btn:active { background: #F8FAFC; }
  .sub-btn .icon { font-size: 18px; }
  .sub-btn .label { flex: 1; font-size: 13px; color: #334155; font-weight: 500; }
  
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: #475569; margin-bottom: 6px; letter-spacing: 0.5px; }
  .req { color: #DC2626; font-size: 8px; vertical-align: middle; }
  input, textarea, select { width: 100%; padding: 11px 13px; border: 1px solid #CBD5E1; border-radius: 9px; font-size: 14px; font-family: inherit; background: white; color: #0F172A; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #0F766E; box-shadow: 0 0 0 3px rgba(15,118,110,0.12); }
  textarea { min-height: 75px; resize: vertical; }
  
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  .submit { width: 100%; padding: 14px; background: linear-gradient(135deg, #06C755 0%, #0F766E 100%); color: white; border: none; border-radius: 11px; font-size: 15px; font-weight: 600; margin-top: 22px; cursor: pointer; box-shadow: 0 3px 10px rgba(15,118,110,0.25); letter-spacing: 0.5px; }
  .submit:active { transform: scale(0.99); }
  .submit:disabled { opacity: 0.6; }
  
  /* チップ */
  .chip-box { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 9px; padding: 10px; }
  .chip-selected { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; margin-bottom: 8px; }
  .chip-empty { color: #94A3B8; font-size: 12px; padding: 4px; }
  .chip-active { background: #0F766E; color: white; padding: 5px 10px; border-radius: 999px; font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .chip-divider { border-top: 1px solid #E2E8F0; margin: 8px 0; padding-top: 8px; font-size: 10px; color: #64748B; font-weight: 600; }
  .chip-available { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip-add { background: white; border: 1px solid #CBD5E1; color: #475569; padding: 5px 10px; border-radius: 999px; font-size: 12px; cursor: pointer; }
  .chip-add:active { background: #F1F5F9; }
  
  /* 業者選択ピッカー(フォーム上のボタン) */
  .picker-btn { width: 100%; background: white; border: 1px solid #CBD5E1; border-radius: 9px; padding: 11px 13px; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; text-align: left; color: #94A3B8; }
  .picker-btn.has-value { background: #ECFEFF; border: 1.5px solid #0F766E; color: #0E7490; font-weight: 500; }
  .picker-btn .icon { color: #94A3B8; font-size: 14px; }
  .picker-btn.has-value .icon { color: #0F766E; font-size: 12px; font-weight: 600; }
  
  /* モーダル(業者選択) */
  .modal { display: none; position: fixed; inset: 0; background: white; z-index: 100; flex-direction: column; }
  .modal.active { display: flex; }
  .modal-header { padding: 14px 16px; border-bottom: 1px solid #E2E8F0; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .modal-close { background: transparent; border: none; font-size: 22px; cursor: pointer; color: #475569; padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .modal-title { font-size: 15px; font-weight: 600; flex: 1; }
  .modal-search { padding: 12px 16px; border-bottom: 1px solid #E2E8F0; flex-shrink: 0; }
  .modal-search-wrap { position: relative; }
  .modal-search-wrap input { padding-left: 36px; }
  .modal-search-wrap .icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94A3B8; font-size: 16px; pointer-events: none; }
  .modal-count { font-size: 11px; color: #64748B; margin-top: 6px; }
  .modal-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
  .modal-item { background: white; border: 1px solid #E2E8F0; border-radius: 9px; padding: 12px 14px; margin-bottom: 6px; font-size: 14px; cursor: pointer; }
  .modal-item:active { background: #F1F5F9; }
  .modal-empty { padding: 30px 20px; text-align: center; color: #94A3B8; font-size: 13px; }
</style>
</head>
<body>

<!-- ===== メニュー画面 ===== -->
<div id="page-menu" class="page active">
  <div class="header">
    <div>
      <div class="eyebrow">MANIFEST MANAGEMENT</div>
      <h1>マニフェスト管理</h1>
    </div>
  </div>
  
  <div class="content">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div>
        <div class="user-info-label">ログイン中</div>
        <div class="user-info-name" id="userName">読み込み中...</div>
      </div>
    </div>
    
    <div class="section-title">新規で依頼する</div>
    
    <button class="menu-btn" onclick="openContractForm()">
      <div class="icon-box icon-green">📄</div>
      <div class="text">
        <div class="title">新規契約の依頼</div>
        <div class="desc">新しい工事の契約書作成</div>
      </div>
      <div class="arrow">›</div>
    </button>
    
    <button class="menu-btn" onclick="openApplyForm()">
      <div class="icon-box icon-blue">🚚</div>
      <div class="text">
        <div class="title">マニフェスト申請</div>
        <div class="desc">廃棄物の排出申請</div>
      </div>
      <div class="arrow">›</div>
    </button>
    
    <div class="divider"></div>
    
    <div class="section-title">履歴・状況確認</div>
    
    <button class="sub-btn">
      <div class="icon">📜</div>
      <div class="label">申請履歴を見る</div>
    </button>
    
    <button class="sub-btn" onclick="showPage('finish')">
      <div class="icon">🏁</div>
      <div class="label">工事を終了する</div>
    </button>
  </div>
</div>

<!-- ===== 契約フォーム画面 ===== -->
<div id="page-contract" class="page">
  <div class="header">
    <button class="back-btn" onclick="showPage('menu')">‹</button>
    <div>
      <div class="eyebrow">NEW CONTRACT</div>
      <h1>新規契約の依頼</h1>
    </div>
  </div>
  
  <div class="content">
    <div class="field">
      <label>工事名 <span class="req">●</span></label>
      <input id="c_projectName" type="text" placeholder="例:〇〇ビル解体工事">
    </div>
    
    <div class="field">
      <label>排出事業者名 <span class="req">●</span></label>
      <input id="c_company" type="text" value="株式会社丸紅">
    </div>
    
    <div class="row2">
      <div class="field">
        <label>担当者名 <span class="req">●</span></label>
        <input id="c_person" type="text">
      </div>
      <div class="field">
        <label>連絡先 <span class="req">●</span></label>
        <input id="c_contact" type="text" placeholder="電話/メール">
      </div>
    </div>
    
    <div class="field">
      <label>収集運搬業者 <span class="req">●</span></label>
      <button class="picker-btn" id="c_transporterBtn" onclick="openVendorPicker('transporter')">
        <span id="c_transporterLabel">タップして選択</span>
        <span class="icon">🔍</span>
      </button>
      <input type="hidden" id="c_transporterId">
      <input type="hidden" id="c_transporterName">
    </div>
    
    <div class="field">
      <label>処分業者 <span class="req">●</span></label>
      <button class="picker-btn" id="c_disposerBtn" onclick="openVendorPicker('disposer')">
        <span id="c_disposerLabel">タップして選択</span>
        <span class="icon">🔍</span>
      </button>
      <input type="hidden" id="c_disposerId">
      <input type="hidden" id="c_disposerName">
    </div>
    
    <div class="field">
      <label>契約開始希望日</label>
      <input id="c_startDate" type="date">
    </div>
    
    <div class="field">
      <label>備考</label>
      <textarea id="c_note"></textarea>
    </div>
    
    <button class="submit" onclick="submitContract()">送信する</button>
  </div>
</div>

<!-- ===== マニフェスト申請フォーム画面 ===== -->
<div id="page-apply" class="page">
  <div class="header">
    <button class="back-btn" onclick="showPage('menu')">‹</button>
    <div>
      <div class="eyebrow">NEW APPLICATION</div>
      <h1>マニフェスト申請</h1>
    </div>
  </div>
  
  <div class="content">
    <div class="field">
      <label>工事名 <span class="req">●</span></label>
      <select id="a_project" onchange="onProjectChange()">
        <option value="">読み込み中...</option>
      </select>
    </div>
    
    <div class="field">
      <label>契約(業者の組み合わせ) <span class="req">●</span></label>
      <select id="a_contract">
        <option value="">先に工事を選んでください</option>
      </select>
    </div>
    
    <div class="field">
      <label>廃棄物の種類(複数選択)</label>
      <div class="chip-box">
        <div class="chip-selected" id="a_wasteSelected">
          <span class="chip-empty">タップして追加してください</span>
        </div>
        <div class="chip-divider">追加できる種類</div>
        <div class="chip-available" id="a_wasteAvailable">読み込み中...</div>
      </div>
    </div>
    
    <div class="row2">
      <div class="field">
        <label>数量 <span class="req">●</span></label>
        <input id="a_quantity" type="text" placeholder="2t、5m³">
      </div>
      <div class="field">
        <label>排出予定日 <span class="req">●</span></label>
        <input id="a_dischargeDate" type="date">
      </div>
    </div>
    
    <div class="field">
      <label>備考</label>
      <textarea id="a_note"></textarea>
    </div>
    
    <button class="submit" onclick="submitApply()">申請を送信</button>
  </div>
</div>

<!-- ===== 業者選択モーダル ===== -->
<div id="vendorModal" class="modal">
  <div class="modal-header">
    <button class="modal-close" onclick="closeVendorPicker()">✕</button>
    <div class="modal-title" id="vendorModalTitle">業者を選択</div>
  </div>
  <div class="modal-search">
    <div class="modal-search-wrap">
      <span class="icon">🔍</span>
      <input id="vendorSearchInput" type="text" placeholder="業者名で検索" oninput="filterVendors()">
    </div>
    <div class="modal-count" id="vendorCount"></div>
  </div>
  <div class="modal-list" id="vendorList"></div>
</div>

<script>
// ===== 設定 =====
const LIFF_ID = '2009834318-xkka6j2s';
const GAS_URL = 'https://script.google.com/macros/s/AKfycby_uAfCcsJ07es9YU46Z02rDkgXBj2B6289YMhmi7C9lXCKEIbrfXNGW3AU6Qe7L2_jPg/exec';

let userProfile = null;
let myContracts = [];
let wasteList = [];
let selectedWastes = [];

// 業者マスタ(モーダル用)
let allTransporters = [];
let allDisposers = [];
let currentPickerType = null;  // 'transporter' or 'disposer'

// ===== LIFF初期化 =====
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    userProfile = await liff.getProfile();
    const name = userProfile.displayName;
    document.getElementById('userName').textContent = name;
    document.getElementById('userAvatar').textContent = name.charAt(0);
    registerUser();
  } catch (e) {
    document.getElementById('userName').textContent = '⚠️ エラー';
  }
}
init();

async function registerUser() {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'registerUser',
        userId: userProfile.userId,
        displayName: userProfile.displayName
      })
    });
  } catch (e) {
    console.error('user register failed:', e);
  }
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== 契約フォームを開く =====
async function openContractForm() {
  showPage('contract');
  // 業者マスタを取得しておく(モーダル用にメモリに保持)
  if (allTransporters.length === 0 || allDisposers.length === 0) {
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getVendors' })
      });
      const data = await res.json();
      if (data.ok) {
        allTransporters = data.transporters;
        allDisposers = data.disposers;
      }
    } catch (e) {
      console.error('vendor fetch failed:', e);
    }
  }
}

// ===== 業者選択モーダルを開く =====
function openVendorPicker(type) {
  currentPickerType = type;
  document.getElementById('vendorModalTitle').textContent = 
    type === 'transporter' ? '収集運搬業者を選択' : '処分業者を選択';
  document.getElementById('vendorSearchInput').value = '';
  document.getElementById('vendorModal').classList.add('active');
  filterVendors();
  setTimeout(() => document.getElementById('vendorSearchInput').focus(), 100);
}

function closeVendorPicker() {
  document.getElementById('vendorModal').classList.remove('active');
}

function filterVendors() {
  const query = document.getElementById('vendorSearchInput').value.trim().toLowerCase();
  const source = currentPickerType === 'transporter' ? allTransporters : allDisposers;
  const filtered = query
    ? source.filter(v => v.name.toLowerCase().includes(query))
    : source;
  
  const listEl = document.getElementById('vendorList');
  const countEl = document.getElementById('vendorCount');
  
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="modal-empty">該当する業者がありません</div>';
    countEl.textContent = '';
  } else {
    countEl.textContent = filtered.length + ' 件';
    listEl.innerHTML = filtered.map(v => 
      `<div class="modal-item" onclick="selectVendor('${escapeAttr(v.id)}','${escapeAttr(v.name)}')">${v.name}</div>`
    ).join('');
  }
}

function selectVendor(id, name) {
  const prefix = currentPickerType === 'transporter' ? 'c_transporter' : 'c_disposer';
  document.getElementById(prefix + 'Id').value = id;
  document.getElementById(prefix + 'Name').value = name;
  document.getElementById(prefix + 'Label').textContent = name;
  document.getElementById(prefix + 'Btn').classList.add('has-value');
  document.querySelector('#' + prefix + 'Btn .icon').textContent = '変更';
  closeVendorPicker();
}

// ===== 契約フォーム送信 =====
async function submitContract() {
  const transId = val('c_transporterId');
  const transName = val('c_transporterName');
  const dispId = val('c_disposerId');
  const dispName = val('c_disposerName');
  
  if (!transId || !dispId) {
    alert('収集運搬業者と処分業者を選択してください');
    return;
  }
  
  const payload = {
    action: 'submitContract',
    applicantName: userProfile ? userProfile.displayName : '不明',
    userId: userProfile ? userProfile.userId : '',
    projectName: val('c_projectName'),
    company: val('c_company'),
    person: val('c_person'),
    contact: val('c_contact'),
    transporterId: transId,
    transporterName: transName,
    disposerId: dispId,
    disposerName: dispName,
    startDate: val('c_startDate'),
    note: val('c_note')
  };
  
  if (!payload.projectName || !payload.company || !payload.person || !payload.contact) {
    alert('必須項目(●)を入力してください');
    return;
  }
  
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '送信中...';
  
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.ok) {
      alert('✅ 契約依頼を送信しました\n依頼ID: ' + data.id);
      clearContractForm();
      showPage('menu');
    } else {
      alert('❌ 送信失敗: ' + data.error);
    }
  } catch (e) {
    alert('❌ 通信エラー: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '送信する';
}

function val(id) { return document.getElementById(id).value.trim(); }

function clearContractForm() {
  ['c_projectName','c_person','c_contact','c_startDate','c_note']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('c_company').value = '株式会社丸紅';
  ['c_transporterId','c_transporterName','c_disposerId','c_disposerName']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('c_transporterLabel').textContent = 'タップして選択';
  document.getElementById('c_disposerLabel').textContent = 'タップして選択';
  document.getElementById('c_transporterBtn').classList.remove('has-value');
  document.getElementById('c_disposerBtn').classList.remove('has-value');
  document.querySelector('#c_transporterBtn .icon').textContent = '🔍';
  document.querySelector('#c_disposerBtn .icon').textContent = '🔍';
}

// ===== 申請フォーム =====
async function openApplyForm() {
  showPage('apply');
  selectedWastes = [];
  document.getElementById('a_contract').innerHTML = '<option value="">先に工事を選んでください</option>';
  
  try {
    const [contractsRes, wastesRes] = await Promise.all([
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'getMyContracts',
          userId: userProfile ? userProfile.userId : ''
        })
      }),
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'getWastes' })
      })
    ]);
    const contractsData = await contractsRes.json();
    const wastesData = await wastesRes.json();
    
    if (contractsData.ok) {
      myContracts = contractsData.contracts;
      const uniqueProjects = [...new Set(myContracts.map(c => c.projectName))];
      const select = document.getElementById('a_project');
      if (uniqueProjects.length > 0) {
        select.innerHTML = '<option value="">選択してください</option>' +
          uniqueProjects.map(p => `<option value="${p}">${p}</option>`).join('');
      } else {
        select.innerHTML = '<option value="">契約済みの工事がありません</option>';
      }
    }
    
    if (wastesData.ok) {
      wasteList = wastesData.wastes;
      renderWasteChips();
    }
  } catch (e) {
    console.error(e);
  }
}

function onProjectChange() {
  const projectName = val('a_project');
  const select = document.getElementById('a_contract');
  
  if (!projectName) {
    select.innerHTML = '<option value="">先に工事を選んでください</option>';
    return;
  }
  
  const filtered = myContracts.filter(c => c.projectName === projectName);
  if (filtered.length === 0) {
    select.innerHTML = '<option value="">この工事の契約がありません</option>';
    return;
  }
  
  select.innerHTML = '<option value="">選択してください</option>' +
    filtered.map(c => `<option value="${c.id}">${c.transporterName} → ${c.disposerName}</option>`).join('');
}

function renderWasteChips() {
  const selectedEl = document.getElementById('a_wasteSelected');
  const availableEl = document.getElementById('a_wasteAvailable');
  
  if (selectedWastes.length === 0) {
    selectedEl.innerHTML = '<span class="chip-empty">タップして追加してください</span>';
  } else {
    selectedEl.innerHTML = selectedWastes.map(w => 
      `<span class="chip-active" onclick="removeWaste('${escapeAttr(w)}')">${w} <span style="opacity:0.7;">×</span></span>`
    ).join('');
  }
  
  const available = wasteList.filter(w => !selectedWastes.includes(w.name));
  if (available.length === 0) {
    availableEl.innerHTML = '<span class="chip-empty">すべて選択済み</span>';
  } else {
    availableEl.innerHTML = available.map(w => 
      `<span class="chip-add" onclick="addWaste('${escapeAttr(w.name)}')">+ ${w.name}</span>`
    ).join('');
  }
}

function addWaste(name) {
  if (!selectedWastes.includes(name)) {
    selectedWastes.push(name);
    renderWasteChips();
  }
}

function removeWaste(name) {
  selectedWastes = selectedWastes.filter(w => w !== name);
  renderWasteChips();
}

function escapeAttr(s) {
  return String(s).replace(/'/g, "\\'");
}

async function submitApply() {
  const projectName = val('a_project');
  const contractId = val('a_contract');
  
  if (!projectName) { alert('工事を選択してください'); return; }
  if (!contractId) { alert('契約を選択してください'); return; }
  
  const payload = {
    action: 'submitApply',
    applicantName: userProfile ? userProfile.displayName : '不明',
    userId: userProfile ? userProfile.userId : '',
    contractId: contractId,
    projectName: projectName,
    wasteTypes: selectedWastes.join(', '),
    quantity: val('a_quantity'),
    dischargeDate: val('a_dischargeDate'),
    note: val('a_note')
  };
  
  if (!payload.quantity || !payload.dischargeDate) {
    alert('必須項目(●)を入力してください');
    return;
  }
  
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '送信中...';
  
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.ok) {
      alert('✅ マニフェスト申請を送信しました\n申請ID: ' + data.id);
      clearApplyForm();
      showPage('menu');
    } else {
      alert('❌ 送信失敗: ' + data.error);
    }
  } catch (e) {
    alert('❌ 通信エラー: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '申請を送信';
}

function clearApplyForm() {
  ['a_project','a_contract','a_quantity','a_dischargeDate','a_note']
    .forEach(id => document.getElementById(id).value = '');
  selectedWastes = [];
}
</script>
