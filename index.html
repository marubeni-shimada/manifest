<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>マニフェスト管理</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Hiragino Sans", sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #333; }
  .page { display: none; padding: 16px; min-height: 100vh; }
  .page.active { display: block; }
  .header { background: #06C755; color: white; padding: 14px 16px; margin: -16px -16px 16px; display: flex; align-items: center; gap: 8px; }
  .header h1 { font-size: 16px; margin: 0; font-weight: 500; }
  .user-box { background: #E8F7EE; color: #0F6E56; padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; }
  .section-label { font-size: 13px; color: #666; margin-bottom: 12px; }
  .menu-btn { width: 100%; padding: 16px; background: white; border: 1.5px solid #06C755; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; text-align: left; margin-bottom: 10px; }
  .menu-btn .icon-circle { width: 40px; height: 40px; background: #E8F7EE; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
  .menu-btn .label { flex: 1; }
  .menu-btn .title { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
  .menu-btn .desc { font-size: 11px; color: #666; }
  .menu-btn .arrow { color: #aaa; font-size: 18px; }
  .divider { border-top: 0.5px solid #ddd; margin: 20px 0 16px; }
  .sub-btn { width: 100%; padding: 14px; background: white; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; text-align: left; margin-bottom: 8px; }
  .sub-btn .icon { font-size: 20px; color: #888; }
  .sub-btn .label { flex: 1; font-size: 14px; }
</style>
</head>
<body>

<!-- ===== メニュー画面 ===== -->
<div id="page-menu" class="page active">
  <div class="header">
    <h1>📋 マニフェスト管理</h1>
  </div>
  
  <div class="user-box" id="userBox">こんにちは、テストユーザーさん</div>
  
  <div class="section-label">新規で依頼する</div>
  
  <button class="menu-btn">
    <div class="icon-circle">📄</div>
    <div class="label">
      <div class="title">新規契約の依頼</div>
      <div class="desc">新しい工事の契約書作成</div>
    </div>
    <div class="arrow">›</div>
  </button>
  
  <button class="menu-btn">
    <div class="icon-circle">🚚</div>
    <div class="label">
      <div class="title">マニフェスト申請</div>
      <div class="desc">廃棄物の排出申請</div>
    </div>
    <div class="arrow">›</div>
  </button>
  
  <div class="divider"></div>
  
  <div class="section-label">履歴・状況確認</div>
  
  <button class="sub-btn">
    <div class="icon">📜</div>
    <div class="label">申請履歴を見る</div>
  </button>
  
  <button class="sub-btn">
    <div class="icon">✅</div>
    <div class="label">契約状況を見る</div>
  </button>
</div>

</body>
</html>
